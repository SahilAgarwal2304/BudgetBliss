<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBliss - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-main);
        }
        .login-card {
            background: var(--bg-surface);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-main);
            box-shadow: 0 8px 32px var(--shadow);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .login-logo {
            width: 64px;
            height: 64px;
            background: var(--bg-elevated);
            border: 2px solid var(--accent-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--accent-primary);
            margin: 0 auto 20px;
        }
        .login-card h1 { margin-bottom: 10px; font-size: 1.8rem; }
        .login-card p { color: var(--text-muted); margin-bottom: 30px; }
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--bg-elevated);
            color: var(--text-heading);
            border: 1px solid var(--border-hover);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }
        .google-btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }
        .google-icon { width: 20px; height: 20px; }
    </style>
</head>
<body data-theme="dark">
    <div class="login-card">
        <div class="login-logo">BB</div>
        <h1>Welcome to BudgetBliss</h1>
        <p>Sign in to manage your finances securely</p>
        
        <button id="google-login-btn" class="google-btn">
            <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continue with Google
        </button>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
